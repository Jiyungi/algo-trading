name: Intraday Check

on:
  schedule:
    # 10:00 AM ET (15:00 UTC) — opening range formed, scan gaps + check exits
    - cron: '0 15 * * 1-5'
    # 12:00 PM ET (17:00 UTC) — midday exit check
    - cron: '0 17 * * 1-5'
    # 2:30 PM ET (19:30 UTC) — late-day check + close intraday positions
    - cron: '30 19 * * 1-5'
  workflow_dispatch: {}   # allow manual trigger

permissions:
  contents: write

jobs:
  intraday:
    runs-on: ubuntu-latest
    env:
      ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
      ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
      DRY_RUN: "0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intraday exit checks (held positions)
        run: python src/intraday_strategy.py

      - name: Run intraday sleeve (gap trades)
        run: python src/intraday_sleeve.py

      - name: Save state files
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add data/trade_log.csv data/cooldowns.json data/positions_state.json data/intraday_state.json 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "chore: update trade log [skip ci]"
          git push
