name: Trade (dry-run)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
      ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
      DRY_RUN: "1"  # always dry-run in CI by default
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Run trade script (dry-run)
        run: python src/trade.py --symbol AAPL --qty 1 --side buy --dry-run
